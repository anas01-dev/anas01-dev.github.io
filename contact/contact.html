<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;1,400&display=swap" rel="stylesheet" />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- tsParticles -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js" defer></script>

  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.12/build/spline-viewer.js"></script>
  <link rel="website icon" href="contact-removebg-preview.png">


</head>
<body>


     <a href="../main.html">
    <button class="main"><strong>Main</strong></button>
  </a>
  <a href="../services/services.html">
    <button class="services"><strong>Services</strong></button>
  </a>
  <a href="../contact/contact.html">
      <button class="contact"><strong>Contact</strong></button>
  </a>

  <div class="cont">
    <p class="you">
        You can contact me by sending me a message on instagram
    </p>
    <a href="https://www.instagram.com/anxs_dev/">
        <img src="images/ig-removebg-preview.png" class="ig">
    </a>
    <p class="or">
        <strong>OR</strong>
    </p>
    <p class="gmail">
        Email: <strong>anaszayaty036@gmail.com</strong>
    </p>

    
  </div>


  <h2 class="contactMe">
    Contact Me
  </h2>

     <!-- Particles -->
    <div id="tsparticles"></div>

    <!-- Particles Config -->
    <script>
      window.onload = () => {
        tsParticles.load("tsparticles", {
          background: { color: { value: "transparent" } },
          fpsLimit: 60,
          particles: {
            color: { value: "#1e3a8a" },
            move: { direction: "none", enable: true, outModes: "bounce", speed: 1 },
            number: { value: 45, density: { enable: true, area: 800 } },
            opacity: { value: 0.4 },
            shape: { type: "circle" },
            size: { value: { min: 1, max: 3 } }
          },
          detectRetina: true
        });
      };
    </script>
</body>
</html>
